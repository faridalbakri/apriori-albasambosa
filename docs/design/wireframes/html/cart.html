<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang — AlbaSambosa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Karla:wght@300;400;500;600;700&family=Playfair+Display+SC:wght@400;700&display=swap');
  h1,h2,h3{font-family:'Playfair Display SC',serif;font-weight:700;}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Karla, system-ui, -apple-system, sans-serif; background: #FEF2F2; color: #450A0A; line-height: 1.5; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 40px; }

  .navbar { display: flex; align-items: center; padding: 14px 0; gap: 16px; margin-bottom: 24px; }
  .back-link { text-decoration: none; color: #7F1D1D; font-size: 14px; font-weight: 500; }
  .back-link:hover { color: #DC2626; }
  .spacer { flex: 1; }
  .page-header { text-align: right; }
  .page-header h1 { font-size: 24px; font-weight: 700; }

  /* Cart items */
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 16px; }
  .cart-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .cart-table th { text-align: left; padding: 12px 16px; background: #FEF2F2; font-size: 13px; font-weight: 600; color: #7F1D1D; border-bottom: 1px solid #FECACA; }
  .cart-table td { padding: 14px 16px; border-bottom: 1px solid #FEF2F2; vertical-align: middle; }
  .cart-table tr:last-child td { border-bottom: none; }
  .qty-control { display: flex; align-items: center; border: 1px solid #FECACA; border-radius: 6px; width: fit-content; }
  .qty-btn { width: 32px; height: 32px; border: none; background: #FEF2F2; cursor: pointer; font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 14px; }
  .qty-btn:hover { background: #FECACA; }
  .qty-val { width: 40px; text-align: center; border-left: 1px solid #FECACA; border-right: 1px solid #FECACA; font-weight: 600; height: 32px; line-height: 32px; }
  .btn-remove { background: none; border: none; color: #DC2626; cursor: pointer; font-size: 18px; padding: 4px 8px; }
  .btn-remove:hover { color: #93000a; }
  .price-col { font-weight: 600; white-space: nowrap; }

  /* Summary */
  .summary-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); padding: 24px; }
  .summary-total { font-size: 22px; font-weight: 700; color: #DC2626; margin-bottom: 16px; display: flex; justify-content: space-between; }
  .btn-checkout { display: block; width: 100%; padding: 14px; background: #DC2626; color: #fff; border: none; border-radius: 8px; font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; transition: background 0.15s; }
  .btn-checkout:hover { background: #991B1B; }

  /* Recommendation */
  .section { margin-top: 32px; }
  .section-header { margin-bottom: 16px; }
  .section-header h3 { font-size: 18px; font-weight: 700; }
  .rec-list { display: flex; gap: 16px; overflow-x: auto; }
  .rec-item { flex: 0 0 200px; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); padding: 16px; text-align: center; }
  .rec-item .thumb { width: 100%; height: 120px; background: #FEF2F2; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 8px; }
  .rec-item .name { font-size: 14px; font-weight: 500; }
  .rec-item .price { font-size: 14px; font-weight: 700; color: #DC2626; }
</style>
</head>
<body>
<div class="container">

  <nav class="navbar">
    <a href="#" class="back-link">&#8592; Belanja</a>
    <span class="spacer"></span>
    <div class="page-header"><h1>Keranjang Saya</h1></div>
  </nav>

  <!-- Cart Table -->
  <div class="card">
    <table class="cart-table">
      <thead>
        <tr><th>#</th><th>Produk</th><th>Qty</th><th>Harga</th><th>Subtotal</th><th></th></tr>
      </thead>
      <tbody>
        <tr>
          <td style="color:#7F1D1D;">1</td>
          <td style="font-weight:500;">Sambal Bawang Premium</td>
          <td>
            <div class="qty-control">
              <button class="qty-btn">&#8722;</button>
              <span class="qty-val">2</span>
              <button class="qty-btn">+</button>
            </div>
          </td>
          <td class="price-col">Rp 35.000</td>
          <td class="price-col">Rp 70.000</td>
          <td><button class="btn-remove">&#128465;</button></td>
        </tr>
        <tr>
          <td style="color:#7F1D1D;">2</td>
          <td style="font-weight:500;">Risol Mayo</td>
          <td>
            <div class="qty-control">
              <button class="qty-btn">&#8722;</button>
              <span class="qty-val">1</span>
              <button class="qty-btn">+</button>
            </div>
          </td>
          <td class="price-col">Rp 50.000</td>
          <td class="price-col">Rp 50.000</td>
          <td><button class="btn-remove">&#128465;</button></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Summary -->
  <div class="summary-card">
    <div class="summary-total">
      <span>Total</span>
      <span>Rp 120.000</span>
    </div>
    <a href="#" class="btn-checkout">Checkout &#8594;</a>
  </div>

  <!-- Recommendation -->
  <div class="section">
    <div class="section-header">
      <h3>Mungkin Anda Juga Suka...</h3>
    </div>
    <div class="rec-list">
      <div class="rec-item">
        <div class="thumb"></div>
        <div class="name">Nasi Box Premium</div>
        <div class="price">Rp 75.000</div>
      </div>
      <div class="rec-item">
        <div class="thumb"></div>
        <div class="name">Sambal Terasi</div>
        <div class="price">Rp 30.000</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
