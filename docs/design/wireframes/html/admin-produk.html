<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk — Admin AlbaSambosa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Karla:wght@300;400;500;600;700&family=Playfair+Display+SC:wght@400;700&display=swap');
  h1,h2,h3{font-family:'Playfair Display SC',serif;font-weight:700;}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Karla, system-ui, -apple-system, sans-serif; background: #FEF2F2; color: #450A0A; line-height: 1.5; display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: #fff; border-right: 1px solid #FECACA; padding: 20px 0; flex-shrink: 0; }
  .sidebar-logo { padding: 0 20px 24px; font-size: 18px; font-weight: 700; color: #DC2626; }
  .sidebar-nav { display: flex; flex-direction: column; }
  .sidebar-nav a { padding: 10px 20px; text-decoration: none; color: #450A0A; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; transition: background 0.1s; }
  .sidebar-nav a:hover, .sidebar-nav a.active { background: #FEF2F2; color: #DC2626; }
  .sidebar-nav a.active { font-weight: 600; border-right: 3px solid #DC2626; }

  .main { flex: 1; padding: 24px 32px; overflow-x: auto; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .page-header h1 { font-size: 24px; font-weight: 700; }

  .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select { padding: 8px 14px; border: 1px solid #FECACA; border-radius: 8px; font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 14px; }
  .filter-bar input { flex: 1; min-width: 200px; }
  .btn-primary { padding: 10px 20px; background: #DC2626; color: #fff; border: none; border-radius: 8px; font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .btn-primary:hover { background: #991B1B; }

  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 12px 16px; background: #FEF2F2; font-weight: 600; font-size: 13px; color: #7F1D1D; border-bottom: 1px solid #FECACA; }
  td { padding: 12px 16px; border-bottom: 1px solid #FEF2F2; vertical-align: middle; }
  tr:hover td { background: #FEF2F2; }
  .img-thumb { width: 44px; height: 44px; background: #FEF2F2; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .stock-cell { font-size: 14px; }
  .stock-reserved { color: #7F1D1D; font-size: 12px; }
  .btn-icon { padding: 6px 12px; border: 1px solid #FECACA; background: #fff; border-radius: 6px; font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 13px; cursor: pointer; color: #450A0A; }
  .btn-icon:hover { background: #FEF2F2; border-color: #DC2626; color: #DC2626; }
  .btn-icon.danger:hover { background: #ffdad6; border-color: #DC2626; color: #DC2626; }
  .pagination { padding: 12px 16px; text-align: center; font-size: 13px; color: #7F1D1D; }

  /* Form Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); align-items: flex-start; justify-content: center; z-index: 100; overflow-y: auto; padding: 40px 0; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 28px; width: 560px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 13px; font-weight: 600; color: #450A0A; }
  .field input, .field select, .field textarea { padding: 10px 14px; border: 1px solid #FECACA; border-radius: 8px; font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 14px; }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #DC2626; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { padding: 10px 20px; border: 1px solid #FECACA; background: #fff; border-radius: 8px; font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 14px; cursor: pointer; }
  .btn-save { padding: 10px 24px; background: #DC2626; color: #fff; border: none; border-radius: 8px; font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">AlbaSambosa</div>
  <div class="sidebar-nav">
    <a href="#">Dashboard</a>
    <a href="#" class="active">Produk</a>
    <a href="#">Kategori</a>
    <a href="#">Pesanan</a>
    <a href="#">Pengiriman</a>
    <a href="#">Apriori</a>
    <a href="#">Notifikasi</a>
    <a href="#">Konfigurasi</a>
  </div>
</nav>

<main class="main">
  <div class="page-header">
    <h1>Produk</h1>
    <button class="btn-primary" onclick="openModal()">+ Tambah Produk</button>
  </div>

  <div class="filter-bar">
    <input type="text" placeholder="&#128269; Cari produk...">
    <select>
      <option>Semua Kategori</option>
      <option>Frozen Food</option>
      <option>Sambal</option>
      <option>Catering</option>
    </select>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr><th>ID</th><th>Produk</th><th>Kategori</th><th>Harga</th><th>Stok</th><th></th></tr>
      </thead>
      <tbody>
        <tr>
          <td style="color:#7F1D1D;">1</td>
          <td style="display:flex; align-items:center; gap:10px;"><span class="img-thumb"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span> <strong>Sambal Bawang</strong></td>
          <td>Sambal</td><td>Rp 35.000</td>
          <td class="stock-cell">50 <span class="stock-reserved">(3 dipesan)</span></td>
          <td style="display:flex; gap:4px;">
            <button class="btn-icon">&#9998; Edit</button>
            <button class="btn-icon danger">&#128465;</button>
          </td>
        </tr>
        <tr>
          <td style="color:#7F1D1D;">2</td>
          <td style="display:flex; align-items:center; gap:10px;"><span class="img-thumb"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span> <strong>Risol Mayo</strong></td>
          <td>Frozen Food</td><td>Rp 50.000</td>
          <td class="stock-cell">25 <span class="stock-reserved">(0)</span></td>
          <td style="display:flex; gap:4px;">
            <button class="btn-icon">&#9998; Edit</button>
            <button class="btn-icon danger">&#128465;</button>
          </td>
        </tr>
        <tr>
          <td style="color:#7F1D1D;">3</td>
          <td style="display:flex; align-items:center; gap:10px;"><span class="img-thumb"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span> <strong>Nasi Box Premium</strong></td>
          <td>Catering</td><td>Rp 75.000</td>
          <td class="stock-cell">10 <span class="stock-reserved">(2 dipesan)</span></td>
          <td style="display:flex; gap:4px;">
            <button class="btn-icon">&#9998; Edit</button>
            <button class="btn-icon danger">&#128465;</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="pagination">&larr; 1 2 3 &rarr;</div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Tambah Produk</h2>
    <div class="form-grid">
      <div class="field full"><label>Nama Produk</label><input type="text" placeholder="Masukkan nama produk"></div>
      <div class="field"><label>Kategori</label><select><option>Frozen Food</option><option>Sambal</option><option>Catering</option></select></div>
      <div class="field"><label>Harga</label><input type="number" placeholder="Rp"></div>
      <div class="field"><label>Stok</label><input type="number" placeholder="0"></div>
      <div class="field"><label>Gambar</label><input type="file"></div>
      <div class="field full"><label>Deskripsi</label><textarea placeholder="Deskripsi produk..."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" onclick="closeModal()">Simpan</button>
    </div>
  </div>
</div>

<script>
function openModal() { document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
</script>

</body>
</html>
