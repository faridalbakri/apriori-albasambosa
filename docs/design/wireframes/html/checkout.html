<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — AlbaSambosa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Karla:wght@300;400;500;600;700&family=Playfair+Display+SC:wght@400;700&display=swap');
  h1,h2,h3{font-family:'Playfair Display SC',serif;font-weight:700;}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Karla, system-ui, -apple-system, sans-serif;
    background: #FEF2F2;
    color: #450A0A;
    line-height: 1.5;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 40px; }

  /* Breadcrumb */
  .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #7F1D1D; margin-bottom: 16px; }
  .breadcrumb a { color: #7F1D1D; text-decoration: none; }
  .breadcrumb a:hover { color: #DC2626; }
  .breadcrumb .sep { color: #FECACA; }

  /* Header */
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .page-header h1 { font-size: 28px; font-weight: 700; color: #450A0A; }

  /* Cards */
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    margin-bottom: 20px;
  }
  .card-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #450A0A; }

  /* Toggle */
  .toggle-group { display: flex; gap: 0; margin-bottom: 20px; }
  .toggle-btn {
    flex: 1; padding: 10px 24px; border: 1px solid #FECACA; background: #fff;
    font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .toggle-btn:first-child { border-radius: 8px 0 0 8px; }
  .toggle-btn:last-child { border-radius: 0 8px 8px 0; }
  .toggle-btn.active { background: #DC2626; color: #fff; border-color: #DC2626; }

  /* Pickup fields */
  .pickup-fields { display: flex; gap: 16px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
  .field label { font-size: 13px; font-weight: 600; color: #450A0A; }
  .field input, .field select {
    padding: 10px 14px; border: 1px solid #FECACA; border-radius: 8px;
    font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 14px; background: #fff;
  }
  .field input:focus, .field select:focus { outline: none; border-color: #DC2626; box-shadow: 0 0 0 3px rgba(0,106,52,0.1); }

  /* Address list */
  .address-list { display: flex; flex-direction: column; gap: 8px; }
  .address-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid #FECACA; border-radius: 8px; cursor: pointer; }
  .address-item.selected { border-color: #DC2626; background: #FEF2F2; }
  .address-item input[type="radio"] { accent-color: #DC2626; }
  .address-new { color: #DC2626; font-weight: 600; font-size: 14px; cursor: pointer; padding: 8px 0; display: inline-block; }

  /* Order summary */
  .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; }
  .summary-row.muted { color: #7F1D1D; font-size: 14px; }
  .summary-divider { border: none; border-top: 1px solid #FECACA; margin: 8px 0; }
  .summary-total { display: flex; justify-content: space-between; padding: 12px 0 0; font-size: 20px; font-weight: 700; color: #DC2626; }

  /* Payment */
  .payment-placeholder {
    background: #FEF2F2; border: 2px dashed #FECACA; border-radius: 8px;
    padding: 40px; text-align: center; color: #7F1D1D; font-size: 14px; margin-bottom: 16px;
  }

  /* Button */
  .btn-primary {
    display: block; width: 100%; padding: 14px; background: #DC2626; color: #fff;
    border: none; border-radius: 8px; font-family: Karla, system-ui, -apple-system, sans-serif; font-size: 16px;
    font-weight: 700; cursor: pointer; transition: background 0.15s;
  }
  .btn-primary:hover { background: #991B1B; }

  .delivery-section { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="#">&#8592; Keranjang</a>
  </div>

  <!-- Header -->
  <div class="page-header">
    <h1>Checkout</h1>
  </div>

  <!-- Metode Pengambilan -->
  <div class="card">
    <div class="toggle-group">
      <button class="toggle-btn active" onclick="switchMethod('pickup')">&#9989; Pickup</button>
      <button class="toggle-btn" onclick="switchMethod('delivery')">Delivery</button>
    </div>

    <!-- Pickup -->
    <div id="pickup-section">
      <div class="card-title">Pilih waktu pickup:</div>
      <div class="pickup-fields">
        <div class="field">
          <label>&#128197; Tanggal</label>
          <input type="date" value="2026-07-10">
        </div>
        <div class="field">
          <label>&#9200; Jam</label>
          <select>
            <option>14:00 - 15:00</option>
            <option>15:00 - 16:00</option>
            <option>16:00 - 17:00</option>
            <option>17:00 - 18:00</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Delivery -->
    <div id="delivery-section" class="delivery-section">
      <div class="card-title">Pilih alamat pengiriman:</div>
      <div class="address-list">
        <label class="address-item selected">
          <input type="radio" name="address" checked> Rumah — Jl. Merdeka No.1
        </label>
        <label class="address-item">
          <input type="radio" name="address"> Kantor — Jl. Sudirman No.2
        </label>
      </div>
      <span class="address-new">+ Alamat Baru</span>
    </div>
  </div>

  <!-- Ringkasan Pesanan -->
  <div class="card">
    <div class="card-title">Ringkasan Pesanan</div>
    <div class="summary-row"><span>Sambal A (2x)</span><span>Rp 70.000</span></div>
    <div class="summary-row"><span>Frozen B (1x)</span><span>Rp 50.000</span></div>
    <hr class="summary-divider">
    <div class="summary-row muted"><span>Ongkos Kirim</span><span>Rp 15.000</span></div>
    <hr class="summary-divider" style="border-width: 2px;">
    <div class="summary-total"><span>Total</span><span>Rp 135.000</span></div>
  </div>

  <!-- Pembayaran -->
  <div class="card">
    <div class="card-title">Metode Pembayaran</div>
    <div class="payment-placeholder">Midtrans Snap akan muncul di sini</div>
    <button class="btn-primary">Bayar Sekarang</button>
  </div>

</div>

<script>
function switchMethod(method) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pickup-section').style.display = method === 'pickup' ? 'block' : 'none';
  document.getElementById('delivery-section').style.display = method === 'delivery' ? 'block' : 'none';
  event.target.classList.add('active');
}
</script>
</body>
</html>
